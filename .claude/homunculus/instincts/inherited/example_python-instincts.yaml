# Example_python Workflow Dependency Update Pip Group

## Action

Follow the dependency-update-pip-group workflow:
1. Identify outdated dependencies in multiple subproject directories.
2. Update the relevant dependency versions in requirements.txt and/or pyproject.toml files.
3. Commit all updated files in a single commit, often with a detailed changelog in the commit message.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: **/requirements.txt, **/pyproject.toml

